<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        .card {
            width: 360px;
            padding: 24px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 12px;
        }

        input,
        button {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            border: none;
            background: #2d6cdf;
            color: #fff;
            cursor: pointer;
        }

        .error {
            color: #b00020;
            font-size: 14px;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Restablecer contraseña</h2>
        {% if token_valido %}
            <form method="POST">
                <input type="password" name="password" placeholder="Nueva contraseña" required />
                <input type="password" name="password_confirm" placeholder="Confirmar contraseña" required />
                <button type="submit">Guardar contraseña</button>
            </form>
        {% endif %}
        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}
        <p><a href="{{ url_for('auth.login') }}">Volver al login</a></p>
    </div>
</body>
</html>
