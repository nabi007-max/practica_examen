<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        .card {
            width: 360px;
            padding: 24px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 12px;
        }

        input,
        button {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            border: none;
            background: #2d6cdf;
            color: #fff;
            cursor: pointer;
        }

        .msg {
            margin-top: 12px;
            font-size: 14px;
        }

        .link {
            display: block;
            margin-top: 8px;
            word-break: break-all;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Recuperar contraseña</h2>
        <form method="POST">
            <input type="email" name="email" placeholder="Ingresa tu correo" required />
            <button type="submit">Generar enlace</button>
        </form>
        {% if mensaje %}
            <p class="msg">{{ mensaje }}</p>
        {% endif %}
        {% if reset_link %}
            <a class="link" href="{{ reset_link }}">{{ reset_link }}</a>
        {% endif %}
        <p><a href="{{ url_for('auth.login') }}">Volver al login</a></p>
    </div>
</body>
</html>
