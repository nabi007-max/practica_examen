<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        .login-card {
            width: 320px;
            padding: 24px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        input,
        button {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            border: none;
            background: #2d6cdf;
            color: #fff;
            cursor: pointer;
        }

        .aux-link {
            margin-top: 12px;
            display: inline-block;
            color: #2d6cdf;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>LOGIN</h2>
        <form method="POST">
            <input type="text" name="nombreusuario" placeholder="Ingrese usuario" required/>
            <input type="password" name="contrasenia" placeholder="Ingrese contrasenia" required/>
            <button type="submit">Ingresar</button>
        </form>
        <a class="aux-link" href="{{ url_for('auth.recuperar_password') }}">¿Olvidaste tu contraseña?</a>
    </div>
</body>
</html>
